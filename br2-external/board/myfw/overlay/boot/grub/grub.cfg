set timeout=3
set default=0

if [ -f (hd0,gpt1)/EFI/BOOT/grubenv ]; then
    load_env --file=(hd0,gpt1)/EFI/BOOT/grubenv
fi

if [ -z "${ORDER}" ]; then
    set ORDER="A B"
fi
if [ -z "${A_OK}" ]; then
    set A_OK=1
fi
if [ -z "${A_TRY}" ]; then
    set A_TRY=0
fi
if [ -z "${B_OK}" ]; then
    set B_OK=0
fi
if [ -z "${B_TRY}" ]; then
    set B_TRY=0
fi

set selected=""

for SLOT in ${ORDER}; do
    if [ "${SLOT}" = "A" ]; then
        set default=0
        set OK="${A_OK}"
        set TRY="${A_TRY}"
        set A_TRY=1
    fi
    if [ "${SLOT}" = "B" ]; then
        set default=1
        set OK="${B_OK}"
        set TRY="${B_TRY}"
        set B_TRY=1
    fi
    if [ "${OK}" = "1" -a "${TRY}" = "0" ]; then
        set selected="${SLOT}"
        break
    fi
done

if [ -z "${selected}" ]; then
    if [ "${A_OK}" = "1" -a "${A_TRY}" = "1" ]; then
        set A_TRY=0
    fi
    if [ "${B_OK}" = "1" -a "${B_TRY}" = "1" ]; then
        set B_TRY=0
    fi
    set default=0
fi

save_env --file=(hd0,gpt1)/EFI/BOOT/grubenv A_TRY A_OK B_TRY B_OK ORDER

menuentry "MyFW slot A" {
    linux (hd0,gpt2)/boot/bzImage root=PARTLABEL=rootfs.A rootwait rw console=tty0 console=ttyS0,115200 rauc.slot=A ipv6.disable=1
}

menuentry "MyFW slot B" {
    linux (hd0,gpt3)/boot/bzImage root=PARTLABEL=rootfs.B rootwait rw console=tty0 console=ttyS0,115200 rauc.slot=B ipv6.disable=1
}

menuentry "MyFW recovery" {
    linux (hd0,gpt2)/boot/bzImage root=PARTLABEL=rootfs.A rootwait rw console=tty0 console=ttyS0,115200 rauc.slot=A ipv6.disable=1
}
