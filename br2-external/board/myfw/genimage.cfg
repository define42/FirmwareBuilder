image efi.vfat {
  vfat {
    file EFI {
      image = "efi-part/EFI"
    }

    file bzImage {
      image = "bzImage"
    }
  }
  size = 64M
}

image data.ext4 {
  ext4 {
    label = "data"
  }
  size = 512M
}

image myfw.img {
  hdimage {
    partition-table-type = "gpt"
  }

  partition efi {
    image = "efi.vfat"
    partition-type-uuid = U
    bootable = true
  }

  partition rootfsA {
    image = "rootfs.ext4"
    partition-type-uuid = L
    size = 256M
  }

  partition rootfsB {
    image = "rootfs.ext4"
    partition-type-uuid = L
    size = 256M
  }

  partition data {
    image = "data.ext4"
    partition-type-uuid = L
  }
}
