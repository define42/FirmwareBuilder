image efi.vfat {
  vfat {
    label = "EFI"

    file EFI {
      image = "efi-part/EFI"
    }
  }
  size = 64M
}

image data.ext4 {
  ext4 {
    label = "data"
  }
  size = 512M
}

image myfw.img {
  hdimage {
    partition-table-type = "gpt"
  }

  partition efi {
    image = "efi.vfat"
    partition-type-uuid = U
    offset = 32K
    bootable = true
  }

  partition rootfs.A {
    image = "rootfs.ext4"
    partition-type-uuid = L
    size = 256M
  }

  partition rootfs.B {
    image = "rootfs.ext4"
    partition-type-uuid = L
    size = 256M
  }

  partition data {
    image = "data.ext4"
    partition-type-uuid = L
  }
}
